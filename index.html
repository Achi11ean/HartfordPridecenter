  </div>

  <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(245,158,11,0.08),transparent_70%)] pointer-events-none"></div>

<style>
/* ==========================
   Background Gear
========================== */

.gear-bg{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:180px;
  color:rgba(245,158,11,.045);
  pointer-events:none;
  animation:gearSpin 24s linear infinite;
  user-select:none;
  filter:blur(.3px);
}

@media (max-width:640px){
  .gear-bg{
    font-size:120px;
  }
}

@keyframes gearSpin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ==========================
   Premium Shimmer
========================== */

.brand-link{
  position:relative;
  overflow:hidden;
}

.brand-link::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
      115deg,
      transparent 20%,
      rgba(255,255,255,.45) 50%,
      transparent 80%
  );
  transform:translateX(-220%);
  animation:shine 4s linear infinite;
}

@keyframes shine{
  to{
    transform:translateX(220%);
  }
}
</style>

<script>
document.getElementById("current-year").textContent =
